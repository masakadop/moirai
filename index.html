<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PNGTuber Web</title>
<meta name="theme-color" content="#14161d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- アバター表示 -->
<canvas id="avatar-canvas"></canvas>

<!-- カメラプレビュー(小窓) -->
<video id="camera-preview" playsinline muted></video>

<!-- ステータス表示 -->
<div id="status" class="hidden"></div>

<!-- 表情切替バー(表情プリセット画像がある時のみ表示) -->
<div id="expr-bar" class="hidden">
  <button data-expr="" class="active">通常</button>
  <button data-expr="joy" class="hidden">喜び</button>
  <button data-expr="surprise" class="hidden">驚き</button>
</div>

<!-- 開始画面 -->
<div id="start-screen">
  <h1>🎭 PNGTuber Web</h1>
  <p>フロントカメラの顔認識で PNG 立ち絵が口パク・まばたきします。</p>
  <p class="privacy">📷 カメラ映像はこの端末内でのみ処理され、外部には一切送信されません。</p>
  <button id="start-btn">カメラを許可して開始</button>
  <p class="hint">読み込みに数秒かかることがあります</p>
</div>

<!-- 設定パネル(画面タップでトグル) -->
<div id="panel" class="hidden">
  <h2>設定</h2>

  <div class="row">
    <label>カメラ</label>
    <button id="flip-btn">前面 / 背面 切替</button>
  </div>
  <div class="row">
    <label for="preview-toggle">カメラプレビュー</label>
    <input type="checkbox" id="preview-toggle" checked>
  </div>
  <div class="row">
    <label for="bg-color">背景色</label>
    <input type="color" id="bg-color" value="#00ff00">
  </div>

  <h3>立ち絵(PNG)</h3>
  <div class="row">
    <label>口閉じ</label>
    <input type="file" id="img-closed" accept="image/*">
  </div>
  <div class="row">
    <label>口開き</label>
    <input type="file" id="img-open" accept="image/*">
  </div>
  <div class="row">
    <label>目閉じ</label>
    <input type="file" id="img-blink" accept="image/*">
  </div>
  <div class="row">
    <button id="reset-images">サンプル画像に戻す</button>
  </div>

  <h3>表情プリセット(任意)</h3>
  <div class="row">
    <label>喜び</label>
    <input type="file" id="img-joy" accept="image/*">
  </div>
  <div class="row">
    <label>驚き</label>
    <input type="file" id="img-surprise" accept="image/*">
  </div>

  <h3>マイク口パク</h3>
  <div class="row">
    <label for="mic-toggle">顔が検出できない時にマイク音量で口パク</label>
    <input type="checkbox" id="mic-toggle">
  </div>

  <h3>検出感度</h3>
  <div class="row">
    <label for="mouth-sens">口パクしきい値 <span id="mouth-sens-val"></span></label>
    <input type="range" id="mouth-sens" min="0.05" max="0.60" step="0.01">
  </div>
  <div class="row">
    <label for="blink-sens">まばたきしきい値 <span id="blink-sens-val"></span></label>
    <input type="range" id="blink-sens" min="0.20" max="0.80" step="0.01">
  </div>

  <p class="privacy small">画像・設定は端末内にのみ保存。映像の外部送信なし</p>
  <p class="hint small">画面タップでこのパネルを閉じます</p>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
